name = "knapsack"
description = "Deterministic hello-world benchmark for the AlphaEvolve pipeline."
seed_program = "knapsack_seed.py"
primary_metric = "score"
target_score = 275.0
system_instructions = """
Act as an expert Python optimization engineer.
Improve the provided program by proposing small, coherent code changes.
Use SEARCH/REPLACE diff blocks only and aim to increase the evaluation score.
"""
task_description = """
The benchmark is a simple knapsack heuristic.
Optimize the ordering heuristic while keeping the Python module executable.
"""
evaluation_contract = """
The program exposes evaluate() and should maximize the returned score.
The current benchmark reaches the global optimum when score == 275.0.
"""

[model]
provider = "ollama"
model = "gemma4:26b-a4b-it-q4_K_M"
base_url = "http://localhost:11434"
request_timeout_seconds = 180.0
temperature = 0.2
max_prompt_tokens = 12000
reserved_completion_tokens = 2048
max_history_programs = 4
max_artifact_context = 3

[sandbox]
backend = "docker"
image = "python:3.12-slim"
runtime = "runsc"
network_mode = "none"
read_only_root = true
tmpfs_path = "/tmp/eval"
tmpfs_size_bytes = 5242880
mem_limit = "256m"
cpu_quota = 50000
timeout_seconds = 10.0
working_dir = "/workspace"

[database]
islands = 3

[[database.feature_axes]]
name = "code_bytes"
source = "code_bytes"
scale = "log1p"
bins = [0.0, 4.2, 4.8, 5.3, 5.8, 6.4, 7.0, 8.0]

[[database.feature_axes]]
name = "duration_ms"
source = "duration_ms"
scale = "log1p"
bins = [0.0, 0.5, 1.0, 1.8, 2.5, 3.5, 4.6, 6.2, 8.6]

[database.migration]
enabled = true
interval_generations = 6
strategy = "best"

[database.novelty]
enabled = true
exact_dedupe = true
similarity_threshold = 0.999
recent_program_window = 20

[database.retention]
hall_of_fame_size = 20
recent_per_cell = 5
recent_success_window = 12
sample_elite_weight = 0.55
sample_recent_weight = 0.25
sample_hall_of_fame_weight = 0.20

[evaluator]
module = "knapsack_evaluator.py"

[evaluator.stages]
enabled = true
max_stages = 2

[evaluator.feedback]
enabled = false
on_success = false
on_failure = true
max_feedback_chars = 600

[evaluator.artifacts]
enabled = true
max_inline_bytes = 4096

[checkpoint]
enabled = true
interval_generations = 5

[controller]
max_generations = 24
max_retries = 3
metrics_interval_seconds = 5.0
stagnation_patience = 8
max_inflight = 1
