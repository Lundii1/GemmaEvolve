name = "turan_tetrahedron"
description = "Search for dense K_4^3-free 3-uniform hypergraphs by evolving a triple-priority heuristic inside a fixed exact greedy builder."
seed_program = "turan_tetrahedron_seed.py"
primary_metric = "score"
target_score = 5502.0
system_instructions = """
Act as an expert Python extremal-combinatorics engineer.
Improve the provided program by proposing small, coherent code changes.
Use SEARCH/REPLACE diff blocks only and aim to increase the evaluation score.
"""
task_description = """
The benchmark constructs deterministic 3-uniform hypergraphs on several vertex counts.
Only the edge-priority heuristic inside the EVOLVE block should change.
The fixed builder greedily adds candidate triples in descending priority order whenever doing so does not create a K_4^3.
Improve the heuristic so the builder accepts more valid triples.
"""
evaluation_contract = """
The program exposes evaluate() and should maximize the returned score.
Scores are the total number of accepted 3-edges across the benchmark cases.
K_4^3-freeness is enforced exactly by the builder, so progress comes from finding better deterministic priorities for which triples to try.
The configured stop target is the score of a strong reference construction, not a proven global optimum.
"""

[model]
provider = "ollama"
model = "kimi-k2.5:cloud"
base_url = "http://127.0.0.1:11434"
request_timeout_seconds = 180.0
temperature = 0.2
max_prompt_tokens = 12000
reserved_completion_tokens = 2048
max_history_programs = 4
max_artifact_context = 3

[sandbox]
backend = "docker"
image = "python:3.12-slim"
runtime = "runc"
network_mode = "none"
read_only_root = true
tmpfs_path = "/tmp/eval"
tmpfs_size_bytes = 5242880
mem_limit = "256m"
cpu_quota = 50000
timeout_seconds = 10.0
working_dir = "/workspace"

[database]
islands = 3

[[database.feature_axes]]
name = "code_bytes"
source = "code_bytes"
scale = "log1p"
bins = [0.0, 4.6, 5.2, 5.8, 6.4, 7.0, 7.6, 8.2]

[[database.feature_axes]]
name = "duration_ms"
source = "duration_ms"
scale = "log1p"
bins = [0.0, 0.5, 1.0, 1.8, 2.5, 3.5, 4.6, 6.2, 8.6]

[database.migration]
enabled = true
interval_generations = 10
strategy = "best"

[database.novelty]
enabled = true
exact_dedupe = true
similarity_threshold = 0.999
recent_program_window = 40

[database.retention]
hall_of_fame_size = 36
recent_per_cell = 8
recent_success_window = 24
sample_elite_weight = 0.50
sample_recent_weight = 0.30
sample_hall_of_fame_weight = 0.20

[evaluator]
module = "score_evaluator.py"

[evaluator.stages]
enabled = true
max_stages = 2

[evaluator.feedback]
enabled = false
on_success = false
on_failure = true
max_feedback_chars = 600

[evaluator.artifacts]
enabled = true
max_inline_bytes = 4096

[checkpoint]
enabled = true
interval_generations = 5

[controller]
max_generations = 120
max_retries = 4
metrics_interval_seconds = 5.0
stagnation_patience = 40
max_inflight = 1
