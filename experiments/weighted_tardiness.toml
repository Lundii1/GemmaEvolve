name = "weighted_tardiness"
description = "Single-machine weighted tardiness scheduling across multiple job suites."
seed_program = "weighted_tardiness_seed.py"
primary_metric = "score"
target_score = 3413.0
system_instructions = """
Act as an expert Python optimization engineer.
Improve the provided program by proposing small, coherent code changes.
Use SEARCH/REPLACE diff blocks only and aim to increase the evaluation score.
"""
task_description = """
Schedule all jobs in each suite to minimize weighted tardiness.
The baseline rule is earliest due date; stronger solutions may use composite dispatch rules,
repair passes, or exact methods while keeping the module deterministic and executable.
"""
evaluation_contract = """
The program exposes evaluate() and should maximize the returned score.
Score is 5000 minus total weighted tardiness across all suites. The exact optimum score is 3413.0.
"""

[model]
provider = "ollama"
model = "gemma4:e4b"
base_url = "http://127.0.0.1:11434"
request_timeout_seconds = 180.0
temperature = 0.2
max_prompt_tokens = 12000
reserved_completion_tokens = 2048
max_history_programs = 4
max_artifact_context = 3

[sandbox]
backend = "docker"
image = "python:3.12-slim"
runtime = "runc"
network_mode = "none"
read_only_root = true
tmpfs_path = "/tmp/eval"
tmpfs_size_bytes = 5242880
mem_limit = "256m"
cpu_quota = 50000
timeout_seconds = 10.0
working_dir = "/workspace"

[database]
islands = 3

[[database.feature_axes]]
name = "code_bytes"
source = "code_bytes"
scale = "log1p"
bins = [0.0, 4.4, 5.0, 5.6, 6.2, 6.8, 7.4, 8.0]

[[database.feature_axes]]
name = "duration_ms"
source = "duration_ms"
scale = "log1p"
bins = [0.0, 0.5, 1.0, 1.8, 2.5, 3.5, 4.6, 6.2, 8.6]

[database.migration]
enabled = true
interval_generations = 8
strategy = "best"

[database.novelty]
enabled = true
exact_dedupe = true
similarity_threshold = 0.999
recent_program_window = 30

[database.retention]
hall_of_fame_size = 24
recent_per_cell = 6
recent_success_window = 16
sample_elite_weight = 0.50
sample_recent_weight = 0.30
sample_hall_of_fame_weight = 0.20

[evaluator]
module = "score_evaluator.py"

[evaluator.stages]
enabled = true
max_stages = 2

[evaluator.feedback]
enabled = false
on_success = false
on_failure = true
max_feedback_chars = 600

[evaluator.artifacts]
enabled = true
max_inline_bytes = 4096

[checkpoint]
enabled = true
interval_generations = 5

[controller]
max_generations = 48
max_retries = 3
metrics_interval_seconds = 5.0
stagnation_patience = 16
max_inflight = 1
