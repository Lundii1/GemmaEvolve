name = "turan_tetrahedron_full_file"
description = "Search for dense K_4^3-free 3-uniform hypergraphs by evolving the full seeded program file with a broader offline runtime envelope."
seed_program = "turan_tetrahedron_seed.py"
primary_metric = "score"
target_score = 5502.0
mutation_scope = "full_file"
system_instructions = """
Act as an expert Python extremal-combinatorics engineer.
Improve the provided program by proposing coherent, high-leverage code changes.
Return raw SEARCH/REPLACE diff blocks only.
Your response must begin with <<<<<<< SEARCH and end with >>>>>>> REPLACE.
Do not include any prose, explanations, markdown fences, comments outside the patch, or text before, between, or after diff blocks.
"""
task_description = """
The benchmark constructs deterministic 3-uniform hypergraphs on several vertex counts.
The current seeded program already scores 5443 on the benchmark cases in this experiment.
The evaluator also reports gains relative to the original mixed-family 5286 baseline for reference.
A 5502-class reference construction is known on these finite cases, so treat that score as achievable rather than speculative.
Your job is to improve the seeded construction within the provided deterministic max_steps budget while preserving exact K_4^3-freeness.
You may rewrite any helper, import, or algorithmic phase in the file, as long as the program still exposes evaluate() and produces the expected metric dictionary.
It is valid to add new helper functions, new data structures, caching, multi-phase search procedures, or to replace improve_construction() entirely with a different bounded optimizer.
Refine the mixed-family basin represented by initial_edges; do not collapse back to pure (1,1,1) behavior.
Prefer one coherent algorithmic change at a time.
"""
evaluation_contract = """
The program must expose evaluate() and should maximize the returned score.
Scores are the total number of accepted 3-edges across the benchmark cases.
The seeded initialization, K_4^3-freeness checks, output validation, and score accounting must remain correct for the evaluator to succeed.
You may change any internal implementation detail in the file, but evaluate() must keep returning a JSON-serializable metrics dictionary.
The configured stop target is the score of a strong reference construction, not a proven global optimum.
"""

[model]
provider = "longcat"
model = "LongCat-Flash-Lite"
base_url = "https://api.longcat.chat/openai"
api_key_env = "LONGCAT_API_KEY"
request_timeout_seconds = 180.0
temperature = 0.4
max_prompt_tokens = 20000
reserved_completion_tokens = 4096
max_history_programs = 6
max_artifact_context = 4

[sandbox]
backend = "docker"
image = "python:3.12-bookworm"
runtime = "runc"
network_mode = "none"
read_only_root = true
tmpfs_path = "/tmp/eval"
tmpfs_size_bytes = 33554432
mem_limit = "1g"
cpu_quota = 100000
timeout_seconds = 120.0
working_dir = "/workspace"
program_filename = "program.py"
run_command = ["python", "{program}"]

[database]
islands = 3

[[database.feature_axes]]
name = "signature_210_ratio"
source = "signature_210_ratio"
scale = "identity"
bins = [0.0, 0.05, 0.12, 0.18, 0.24, 0.30, 0.38, 0.48, 0.60]

[[database.feature_axes]]
name = "signature_300_ratio"
source = "signature_300_ratio"
scale = "identity"
bins = [0.0, 0.01, 0.03, 0.06, 0.10, 0.15, 0.22]

[[database.feature_axes]]
name = "late_case_ratio"
source = "late_case_ratio"
scale = "identity"
bins = [0.0, 0.48, 0.52, 0.56, 0.60, 0.64, 0.68, 0.72, 0.76]

[database.migration]
enabled = true
interval_generations = 10
strategy = "best"

[database.novelty]
enabled = true
exact_dedupe = true
similarity_threshold = 0.999
recent_program_window = 40

[database.retention]
hall_of_fame_size = 36
recent_per_cell = 8
recent_success_window = 24
sample_elite_weight = 0.40
sample_recent_weight = 0.35
sample_hall_of_fame_weight = 0.25
parent_share_window = 64
parent_share_cap = 0.35
best_parent_cooldown_samples = 8
mutation_failure_streak_threshold = 3
mutation_failure_penalty_samples = 12
mutation_failure_weight_multiplier = 0.20

[evaluator]
module = "score_evaluator.py"

[evaluator.stages]
enabled = true
max_stages = 2

[evaluator.feedback]
enabled = true
on_success = false
on_failure = true
borderline_score_threshold = 5400.0
max_feedback_chars = 800

[evaluator.artifacts]
enabled = true
max_inline_bytes = 8192

[checkpoint]
enabled = true
interval_generations = 5

[controller]
max_generations = 20000
max_retries = 5
metrics_interval_seconds = 5.0
stagnation_patience = 5000
max_inflight = 2
